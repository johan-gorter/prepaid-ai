name: Deploy to Sandbox

on:
  workflow_dispatch:

jobs:
  deploy-sandbox:
    name: Deploy to Sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # GitHub's hostedtoolcache Node build (the binary `setup-node` installs)
      # fails the OAuth2 token exchange to www.googleapis.com/oauth2/v4/token with
      # "Premature close" while reading the access-token response, which
      # firebase-tools reports as the generic "Failed to authenticate, have you run
      # firebase login?". The official nodejs.org build of the same version does
      # not. Install it and put it first on PATH so npm/npx/firebase run under it.
      - name: Use official Node.js build for deploy (toolcache build breaks Google auth)
        run: |
          set -e
          ver=v24.18.0
          curl -fsS -m 120 -o /tmp/node.tar.xz \
            "https://nodejs.org/dist/$ver/node-$ver-linux-x64.tar.xz"
          sudo mkdir -p /opt/official-node
          sudo tar -xJf /tmp/node.tar.xz -C /opt/official-node --strip-components=1
          echo "/opt/official-node/bin" >> "$GITHUB_PATH"

      - name: Confirm official Node is active
        run: |
          echo "node: $(command -v node) -> $(node --version)"
          node -e "console.log('execPath='+process.execPath+' undici='+process.versions.undici)"

      - name: Install dependencies
        run: npm ci

      - name: Build for sandbox
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_SANDBOX }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_SANDBOX }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_SANDBOX }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_SANDBOX }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_SANDBOX }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_SANDBOX }}
          VITE_FUNCTIONS_REGION: ${{ vars.VITE_FUNCTIONS_REGION_SANDBOX }}

      - name: Install and build Cloud Functions
        run: npm ci --prefix functions && npm run --prefix functions build

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SANDBOX }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy to sandbox project
        run: |
          npx firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project prepaid-ai-sandbox \
            --force
