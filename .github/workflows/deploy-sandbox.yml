name: Deploy to Sandbox

on:
  workflow_dispatch:

jobs:
  deploy-sandbox:
    name: Deploy to Sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for sandbox
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_SANDBOX }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_SANDBOX }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_SANDBOX }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_SANDBOX }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_SANDBOX }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_SANDBOX }}
          VITE_FUNCTIONS_REGION: ${{ vars.VITE_FUNCTIONS_REGION_SANDBOX }}

      - name: Install and build Cloud Functions
        run: npm ci --prefix functions && npm run --prefix functions build

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SANDBOX }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy to sandbox project
        run: |
          npx firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project prepaid-ai-sandbox \
            --force
