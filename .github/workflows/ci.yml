name: CI — Tests

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_DEV }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_DEV }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_DEV }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_DEV }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_DEV }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_DEV }}
          VITE_FUNCTIONS_REGION: ${{ vars.VITE_FUNCTIONS_REGION_DEV }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  test-e2e:
    name: E2E Tests (${{ matrix.shard }}/3)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Pin the emulator binaries run-to-run instead of re-downloading them every
      # time (Firebase warns about this in CI). A fresh/changed emulator build is
      # the likeliest trigger for the auth-emulator connection drops we saw.
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-

      - name: Start tracked E2E services
        run: |
          npm run services:start emulators
          npm run services:start dev:emulators

      - name: Wait for tracked E2E services
        run: npm run services:wait emulators dev:emulators

      - name: Run E2E tests
        run: npx playwright test --config=playwright.config.ts --shard=${{ matrix.shard }}/3
        env:
          CI: true

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "::group::Emulator log (logs/services/emulators.log)"
          cat logs/services/emulators.log || echo "(no emulator log found)"
          echo "::endgroup::"
          echo "::group::Dev server log (logs/services/dev_emulators.log)"
          cat logs/services/dev_emulators.log || echo "(no dev server log found)"
          echo "::endgroup::"

      - name: Upload E2E test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-e2e-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

  test-pwa:
    name: PWA Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start tracked PWA preview service
        run: npm run services:start preview:emulators

      - name: Wait for tracked PWA preview service
        run: npm run services:wait preview:emulators

      - name: Run PWA tests
        run: npx playwright test --config=playwright-pwa.config.ts
        env:
          CI: true

      - name: Upload PWA test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-pwa-report
          path: playwright-report/
          retention-days: 14

  test-ct:
    name: Component Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run component tests
        run: npx playwright test --config=playwright-ct.config.ts
        env:
          CI: true

      - name: Upload CT test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-ct-report
          path: playwright-report/
          retention-days: 14

  deploy-dev:
    name: Deploy to Dev
    needs: [build, test-e2e, test-pwa, test-ct]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install dependencies
        run: npm ci

      - name: Install and build Cloud Functions
        run: npm ci --prefix functions && npm run --prefix functions build

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      # TEMP DIAGNOSTIC (remove after): the SA key authenticates fine from a
      # local PC, so this captures how the CI runner differs — tooling/versions,
      # network reachability, the account resolved before vs after ADC auth, and
      # the *real* error that firebase-tools swallows into "have you run firebase
      # login?". Never prints the private key.
      - name: DIAG firebase auth environment
        continue-on-error: true
        run: |
          set +e

          echo "::group::which / versions / same executable?"
          echo "node:     $(which node) -> $(node --version)"
          echo "npm:      $(which npm) -> $(npm --version)"
          echo "npx:      $(which npx)"
          echo "firebase (PATH): $(which firebase || echo '(not on PATH; using npx-resolved local bin)')"
          echo "npx firebase --version: $(npx firebase --version 2>/dev/null)"
          node -e "console.log('firebase-tools resolved:', require.resolve('firebase-tools/package.json')); console.log('firebase-tools version:', require('firebase-tools/package.json').version)"
          node -e "const {createRequire}=require('module');const r=createRequire(require.resolve('firebase-tools/package.json'));console.log('google-auth-library resolved:', r.resolve('google-auth-library'));console.log('google-auth-library version:', r('google-auth-library/package.json').version)"
          echo "::endgroup::"

          echo "::group::clock (JWT iat/exp is signed against this)"
          date -u; echo "epoch=$(date -u +%s)"
          echo "::endgroup::"

          echo "::group::key file (no private key printed)"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS"
          echo "size_bytes=$(wc -c < "$RUNNER_TEMP/sa-key.json")"
          echo "line_count=$(wc -l < "$RUNNER_TEMP/sa-key.json")"
          echo "first_char=$(head -c 1 "$RUNNER_TEMP/sa-key.json" | xxd -p)"
          echo "has_cr=$(grep -c $'\r' "$RUNNER_TEMP/sa-key.json" || true)"
          node -e "const k=require(process.env.RUNNER_TEMP+'/sa-key.json'); console.log('json_ok type='+k.type+' project='+k.project_id+' email='+k.client_email+' pkid='+k.private_key_id+' pk_len='+(k.private_key||'').length+' token_uri='+k.token_uri)"
          echo "::endgroup::"

          echo "::group::network reachability (Google auth + deploy APIs)"
          for h in oauth2.googleapis.com www.googleapis.com firebase.googleapis.com cloudfunctions.googleapis.com firebasehosting.googleapis.com iam.googleapis.com storage.googleapis.com; do
            code=$(curl -sS -o /dev/null -m 15 -w "%{http_code}" "https://$h" 2>/tmp/curlerr); rc=$?
            echo "$h -> http=$code curl_rc=$rc $( [ "$rc" -ne 0 ] && cat /tmp/curlerr )"
          done
          curl -sS -m 15 -o /dev/null -X POST https://oauth2.googleapis.com/token \
            -w "POST oauth2.googleapis.com/token -> http=%{http_code} (400 = reachable)\n" \
            || echo "token endpoint UNREACHABLE (network blocked?)"
          echo "::endgroup::"

          echo "::group::account BEFORE (firebase login state / interfering env)"
          npx firebase login:list 2>&1 | head -20
          echo "FIREBASE_TOKEN set? $([ -n "$FIREBASE_TOKEN" ] && echo yes || echo no)"
          echo "GOOGLE_GHA_CREDS_PATH=${GOOGLE_GHA_CREDS_PATH:-(unset)}"
          echo "CLOUDSDK env: $(env | grep -i '^CLOUDSDK' | cut -d= -f1 | tr '\n' ' ' || echo none)"
          echo "::endgroup::"

          echo "::group::direct ADC exchange — real error + account AFTER"
          node -e '
            const {createRequire}=require("module");
            const req=createRequire(require.resolve("firebase-tools/package.json"));
            const {GoogleAuth}=req("google-auth-library");
            (async()=>{
              try{
                const auth=new GoogleAuth({scopes:["https://www.googleapis.com/auth/cloud-platform"]});
                console.log("ADC projectId:", await auth.getProjectId().catch(e=>"(failed: "+e.message+")"));
                const client=await auth.getClient();
                console.log("ADC client type:", client.constructor.name);
                const creds=await client.getCredentials().catch(e=>({_err:e.message}));
                console.log("account AFTER (client_email):", creds.client_email||creds._err);
                const t=await client.getAccessToken();
                console.log("ACCESS_TOKEN_OK len="+((t&&t.token)||"").length);
              }catch(e){
                console.log("REAL_AUTH_ERROR name="+e.name+" message="+e.message);
                if(e.response&&e.response.data)console.log("RESP_DATA="+JSON.stringify(e.response.data));
                if(e.cause)console.log("CAUSE="+(e.cause.message||e.cause));
              }
            })();
          '
          echo "::endgroup::"

          echo "::group::firebase projects:list --debug (surfaces the swallowed original error)"
          npx firebase projects:list --debug 2>&1 \
            | grep -iE "prepaid-ai|error|authenticate|firebase login|credential|invalid_grant|access ?token|client_email|account|original" \
            | head -60
          echo "::endgroup::"

      - name: Deploy to dev project
        run: |
          npx firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project prepaid-ai-dev \
            --force

  deploy-production:
    name: Deploy to Production
    needs: [test-e2e, test-pwa, test-ct]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_PRODUCTION }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_PRODUCTION }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_PRODUCTION }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_PRODUCTION }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_PRODUCTION }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_PRODUCTION }}
          VITE_FUNCTIONS_REGION: ${{ vars.VITE_FUNCTIONS_REGION_PRODUCTION }}

      - name: Install and build Cloud Functions
        run: npm ci --prefix functions && npm run --prefix functions build

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy to production
        run: |
          npx firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project payasyougo-production \
            --force
