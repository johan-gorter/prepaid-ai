name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_DEV }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_DEV }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_DEV }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_DEV }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_DEV }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_DEV }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  test-e2e:
    name: E2E Tests (${{ matrix.shard }}/2)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start tracked E2E services
        run: |
          npm run services:start emulators
          npm run services:start dev:emulators

      - name: Wait for tracked E2E services
        run: npm run services:wait emulators dev:emulators

      - name: Run E2E tests
        run: npx playwright test --config=playwright.config.ts --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload E2E test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

  test-pwa:
    name: PWA Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start tracked PWA preview service
        run: npm run services:start preview:emulators

      - name: Wait for tracked PWA preview service
        run: npm run services:wait preview:emulators

      - name: Run PWA tests
        run: npx playwright test --config=playwright-pwa.config.ts
        env:
          CI: true

      - name: Upload PWA test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pwa-report
          path: playwright-report/
          retention-days: 14

  test-ct:
    name: Component Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run component tests
        run: npx playwright test --config=playwright-ct.config.ts
        env:
          CI: true

      - name: Upload CT test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ct-report
          path: playwright-report/
          retention-days: 14

  deploy-dev:
    name: Deploy to Dev
    needs: [build, test-e2e, test-pwa, test-ct]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install dependencies
        run: npm ci

      - name: Install and build Cloud Functions
        run: npm ci --prefix functions && npm run --prefix functions build

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete old v2 beforeCreate if present (one-time v2→v1 migration)
        continue-on-error: true
        run: |
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa-key.json"
          # firebase-tools inherits cpu from the previously-deployed v2 Cloud Run service,
          # which then fails validation when redeploying as v1 ("Cannot set CPU on GCF gen 1").
          # Deleting the v2 function first avoids this. After migration the gen2 list is empty
          # and this becomes a permanent no-op.
          if gcloud functions list \
               --gen2 \
               --regions=europe-west1 \
               --project=prepaid-ai-dev \
               --filter="name:beforeCreate" \
               --format="value(name)" 2>/dev/null | grep -q .; then
            gcloud functions delete beforeCreate \
              --gen2 \
              --region=europe-west1 \
              --project=prepaid-ai-dev \
              --quiet
          fi

      - name: Deploy to dev project
        run: |
          npx firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project prepaid-ai-dev \
            --force
