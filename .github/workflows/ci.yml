  deploy-experimental:
    name: Deploy to Experimental
    needs: [build, test-e2e, test-pwa, test-ct]
    # TEMP: was pull_request only — now also deploys on push to main
    # if: github.event_name == 'pull_request'
    if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for experimental
        run: npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_EXPERIMENTAL }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_EXPERIMENTAL }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_EXPERIMENTAL }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_EXPERIMENTAL }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_EXPERIMENTAL }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_EXPERIMENTAL }}

      - name: Install and build Cloud Functions
        run: npm ci --prefix functions && npm run --prefix functions build

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EXPERIMENTAL }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy to experimental project
        run: npx firebase deploy --only hosting,functions --project prepaid-ai-experimental
